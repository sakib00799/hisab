name: E2E

# Run manually against a deployed environment (staging), or nightly.
# Do not point this at production — the flows create real accounts.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed URL to test against (staging)"
        required: true
        default: "https://staging.your-domain.example"
  schedule:
    - cron: "0 2 * * *"

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Nightly runs need the E2E_BASE_URL repository variable to be configured.
    if: github.event_name == 'workflow_dispatch' || vars.E2E_BASE_URL != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || vars.E2E_BASE_URL }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
